function Hero({t}){return<section style={{position:"relative",minHeight:520,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(170deg,#0e0e1e,#1a1a3a 40%,#2a1a2a)",overflow:"hidden"}}><div style={{position:"absolute",top:-120,right:-100,width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(232,84,62,.12),transparent 70%)"}}/><div style={{position:"absolute",bottom:-80,left:-60,width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(90,60,180,.1),transparent 70%)"}}/><div className="fade-up" style={{textAlign:"center",position:"relative",zIndex:2,padding:"100px 24px 70px"}}><h1 style={{fontSize:"clamp(32px,5vw,56px)",...B,color:"#fff",lineHeight:1.1}}>{t.hero}</h1><p style={{fontSize:"clamp(14px,2vw,18px)",color:"rgba(255,255,255,.45)",marginTop:14}}>{t.heroSub}</p><div className="hero-stats" style={{display:"flex",justifyContent:"center",gap:44,marginTop:40}}>{[["home",t.sL,"12,400+"],["location_city",t.sC,"36"],["support_agent",t.sA,"580+"],["group",t.sU,"25,000+"]].map(([ic,lb,v],i)=><div key={lb} style={{textAlign:"center",animation:`countUp .5s ${.15+i*.08}s cubic-bezier(.4,0,.2,1) both`}}><div style={{fontSize:28,...B,color:"#e8543e"}}>{v}</div><div style={{fontSize:12,color:"rgba(255,255,255,.35)",marginTop:3}}>{lb}</div></div>)}</div></div></section>}

/* ══ Helpers ══ */
function useClickOutside(ref,fn){useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))fn()};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[fn])}
function Pill({label,active,open,onClick,badge}){return<button onClick={onClick} style={{padding:"8px 14px",borderRadius:20,border:open?"2px solid #e8543e":"1.5px solid #e0dfe6",background:open?"#fef0ed":"#fff",color:open||active?"#e8543e":"#555",cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",transition:"all .12s"}}>{label}{badge>0&&<span style={{background:"#e8543e",color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700,minWidth:18,textAlign:"center"}}>{badge}</span>}<IC n={open?"expand_less":"expand_more"} s={16} style={{color:open?"#e8543e":"#aaa"}}/></button>}
function DD({children,open}){if(!open)return null;return<div className="dd" style={{position:"absolute",top:"calc(100% + 6px)",left:0,minWidth:280,background:"#fff",borderRadius:12,boxShadow:"0 12px 40px rgba(0,0,0,.12)",padding:"16px",zIndex:50,animation:"dropIn .15s ease"}}>{children}</div>}
function ApplyBtn({t,onClick}){return<button onClick={onClick} style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #e8e7ee",background:"#fafafa",color:"#555",cursor:"pointer",fontSize:13,fontWeight:600,marginTop:12}}>{t.apply}</button>}

/* ══ Location Search with autocomplete ══ */
function LocSearch({loc,setLoc,t}){
  const[q,setQ]=useState("");
  const[focused,setFoc]=useState(false);
  const ref=useRef();
  useClickOutside(ref,()=>setFoc(false));

  const results=q.length>=1?LOCS.filter(l=>l.name.toLowerCase().includes(q.toLowerCase())).slice(0,8):[];
  const icons={city:"location_city",village:"holiday_village",district:"map"};

  return<div ref={ref} style={{flex:1,position:"relative"}}>
    <div style={{display:"flex",alignItems:"center",background:"#fff",borderRadius:10,border:focused?"2px solid #e8543e":"1.5px solid #e0dfe6",padding:"0 14px",transition:"border .15s"}}>
      <IC n="search" s={20} style={{color:"#bbb",flexShrink:0}}/>
      <input
        value={loc||q}
        onFocus={()=>{setFoc(true);if(loc){setQ(loc);setLoc("")}}}
        onChange={e=>{setQ(e.target.value);setLoc("")}}
        placeholder={t.locPh}
        style={{border:"none",padding:"12px 10px",fontSize:15,fontWeight:500,color:"#1a1a2e",width:"100%",background:"transparent"}}
      />
      {(loc||q)&&<button onClick={()=>{setQ("");setLoc("")}} style={{border:"none",background:"none",cursor:"pointer",padding:4,display:"flex"}}><IC n="close" s={18} style={{color:"#bbb"}}/></button>}
    </div>
    {focused&&results.length>0&&<div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#fff",borderRadius:10,boxShadow:"0 10px 32px rgba(0,0,0,.12)",overflow:"hidden",zIndex:60,animation:"dropIn .12s ease"}}>
      {results.map(r=><button key={r.name} onClick={()=>{setLoc(r.name);setQ("");setFoc(false)}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 14px",border:"none",background:"#fff",cursor:"pointer",fontSize:13,color:"#333",textAlign:"left"}} onMouseEnter={e=>e.target.style.background="#f5f4fa"} onMouseLeave={e=>e.target.style.background="#fff"}>
        <IC n={icons[r.type]||"location_on"} s={18} style={{color:"#ccc"}}/>
        <span>{r.name}</span>
        <span style={{fontSize:11,color:"#bbb",marginLeft:"auto"}}>{r.type}</span>
      </button>)}
    </div>}
  </div>;
}

/* ══ Filter Bar ══ */
function FilterBar({t,f,sf,opTab,setOpTab,setF,setSF,loc,setLoc}){
  const[openDD,setOpenDD]=useState(null);
  const[tmpP,setTmpP]=useState({min:"",max:""});
  const[tmpR,setTmpR]=useState([]);
  const[tmpA,setTmpA]=useState({min:"",max:""});
  useEffect(()=>{
    if(openDD==="price")setTmpP({min:f.pMin,max:f.pMax});
    if(openDD==="rooms")setTmpR([...f.rooms]);
    if(openDD==="area")setTmpA({min:sf.areaMin,max:sf.areaMax});
  },[openDD]);
  const ref=useRef();useClickOutside(ref,()=>setOpenDD(null));

  const sfCount=[sf.areaMin,sf.areaMax,sf.flMin,sf.flMax,sf.flsMin,sf.flsMax,sf.yrMin,sf.yrMax,sf.cond,sf.heat,sf.wall,sf.notFirst,sf.notLast].filter(Boolean).length;
  const typeLbl=f.type?t[f.type]:t.apartment; // ← only type name, no operation
  const priceLbl=f.pMin||f.pMax?`€${f.pMin||"…"}–${f.pMax||"…"}`:t.price;
  const roomsLbl=f.rooms.length?f.rooms.map(v=>v===4?"4+":v).join(", "):t.rooms;
  const areaLbl=sf.areaMin||sf.areaMax?`${sf.areaMin||"…"}–${sf.areaMax||"…"} ${t.m2}`:t.area;
  const toggle=k=>setOpenDD(openDD===k?null:k);

  return<div ref={ref} style={{maxWidth:1280,margin:"-44px auto 0",padding:"0 20px",position:"relative",zIndex:10}}>
    <div style={{background:"#fff",borderRadius:14,boxShadow:"0 12px 40px rgba(0,0,0,.08)",padding:"14px 16px 12px"}}>

      {/* ── Location search + Operation tabs row ── */}
      <div className="loc-row" style={{display:"flex",gap:10,marginBottom:12,alignItems:"center"}}>
        <LocSearch loc={loc} setLoc={setLoc} t={t}/>
        <div style={{display:"flex",gap:3,flexShrink:0}}>
          {[{k:"buy",i:"shopping_cart"},{k:"rent",i:"key"},{k:"daily",i:"calendar_today"}].map(tb=><button key={tb.k} onClick={()=>{setOpTab(tb.k);setOpenDD(null)}} style={{padding:"8px 14px",borderRadius:16,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:opTab===tb.k?"#1a1a2e":"#f0eff5",color:opTab===tb.k?"#fff":"#888",transition:"all .15s",display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}><IC n={tb.i} s={14} style={{color:opTab===tb.k?"#fff":"#bbb"}}/>{t[tb.k]}</button>)}
        </div>
      </div>

      {/* ── Pill buttons ── */}
      <div className="filter-pills" style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        {/* Type */}
        <div style={{position:"relative"}}>
          <Pill label={typeLbl} active={!!f.type} open={openDD==="type"} onClick={()=>toggle("type")}/>
          <DD open={openDD==="type"}>
            {["apartment","house","villa","land","commercial"].map(tp=><button key={tp} onClick={()=>{setF(p=>({...p,type:tp}));setOpenDD(null)}} style={{display:"block",width:"100%",padding:"9px 12px",borderRadius:7,border:f.type===tp?"2px solid #e8543e":"1px solid #eee",background:f.type===tp?"#fef0ed":"#fff",color:f.type===tp?"#e8543e":"#444",cursor:"pointer",fontSize:13,fontWeight:f.type===tp?700:500,textAlign:"left",marginBottom:3}}>{t[tp]}</button>)}
          </DD>
        </div>
        {/* Price */}
        <div style={{position:"relative"}}>
          <Pill label={priceLbl} active={!!(f.pMin||f.pMax)} open={openDD==="price"} onClick={()=>toggle("price")}/>
          <DD open={openDD==="price"}>
            <div style={{display:"flex",gap:6,marginBottom:10}}><input style={INP} type="number" placeholder={t.from} value={tmpP.min} onChange={e=>setTmpP(p=>({...p,min:e.target.value}))}/><input style={INP} type="number" placeholder={t.to} value={tmpP.max} onChange={e=>setTmpP(p=>({...p,max:e.target.value}))}/></div>
            <div style={{display:"flex",gap:3,marginBottom:8}}>{["€","$","ALL"].map(c=><button key={c} style={{flex:1,padding:"7px",borderRadius:7,border:"none",background:c==="€"?"#1a1a2e":"#f0eff5",color:c==="€"?"#fff":"#888",cursor:"pointer",fontSize:13,fontWeight:700}}>{c}</button>)}</div>
            <div style={{display:"flex",gap:3}}><button style={{flex:1,padding:"7px",borderRadius:7,border:"none",background:"#1a1a2e",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>{t.perObj}</button><button style={{flex:1,padding:"7px",borderRadius:7,border:"none",background:"#f0eff5",color:"#888",fontSize:12,fontWeight:600,cursor:"pointer"}}>{t.perM2}</button></div>
            <ApplyBtn t={t} onClick={()=>{setF(p=>({...p,pMin:tmpP.min,pMax:tmpP.max}));setOpenDD(null)}}/>
          </DD>
        </div>
        {/* Rooms */}
        <div style={{position:"relative"}}>
          <Pill label={roomsLbl} active={f.rooms.length>0} open={openDD==="rooms"} onClick={()=>toggle("rooms")}/>
          <DD open={openDD==="rooms"}>
            <div style={{fontSize:13,fontWeight:700,color:"#333",marginBottom:10}}>{t.rooms}</div>
            <div style={{display:"flex",gap:6}}>{[1,2,3,4].map(v=>{const a=tmpR.includes(v);return<button key={v} onClick={()=>setTmpR(p=>a?p.filter(x=>x!==v):[...p,v])} style={{flex:1,padding:"10px 0",borderRadius:8,border:a?"2px solid #e8543e":"1.5px solid #e0dfe6",background:a?"#fef0ed":"#fff",color:a?"#e8543e":"#555",cursor:"pointer",fontSize:15,fontWeight:a?700:500}}>{v===4?"4+":v}</button>})}</div>
            <ApplyBtn t={t} onClick={()=>{setF(p=>({...p,rooms:tmpR}));setOpenDD(null)}}/>
          </DD>
        </div>
        {/* Area */}
        <div style={{position:"relative"}}>
          <Pill label={areaLbl} active={!!(sf.areaMin||sf.areaMax)} open={openDD==="area"} onClick={()=>toggle("area")}/>
          <DD open={openDD==="area"}>
            <div style={{fontSize:13,fontWeight:700,color:"#333",marginBottom:10}}>{t.totalArea}</div>
            <div style={{display:"flex",gap:6}}><input style={INP} type="number" placeholder={t.from} value={tmpA.min} onChange={e=>setTmpA(p=>({...p,min:e.target.value}))}/><input style={INP} type="number" placeholder={t.to} value={tmpA.max} onChange={e=>setTmpA(p=>({...p,max:e.target.value}))}/></div>
            <ApplyBtn t={t} onClick={()=>{setSF(p=>({...p,areaMin:tmpA.min,areaMax:tmpA.max}));setOpenDD(null)}}/>
          </DD>
        </div>
        {/* Filters */}
        <div style={{position:"relative"}}><Pill label={t.filters} badge={sfCount} active={sfCount>0} open={openDD==="filters"} onClick={()=>toggle("filters")}/></div>
      </div>

      {/* ── Advanced panel ── */}
      {openDD==="filters"&&<div style={{borderTop:"1px solid #eee",marginTop:12,paddingTop:14,animation:"dropIn .2s ease"}}>
        <div className="adv-grid" style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:"14px 24px",alignItems:"center",fontSize:13}}>
          <div style={{color:"#888",fontWeight:600}}>{t.floor}</div>
          <div style={{display:"flex",gap:6,maxWidth:300}}><input style={INP} type="number" placeholder={t.from.toLowerCase()} value={sf.flMin} onChange={e=>setSF(p=>({...p,flMin:e.target.value}))}/><input style={INP} type="number" placeholder={t.to.toLowerCase()} value={sf.flMax} onChange={e=>setSF(p=>({...p,flMax:e.target.value}))}/></div>
          <div style={{color:"#888",fontWeight:600}}>{t.floors}</div>
          <div style={{display:"flex",gap:6,maxWidth:500,flexWrap:"wrap",alignItems:"center"}}><input style={{...INP,width:120}} type="number" placeholder={t.from.toLowerCase()} value={sf.flsMin} onChange={e=>setSF(p=>({...p,flsMin:e.target.value}))}/><input style={{...INP,width:120}} type="number" placeholder={t.to.toLowerCase()} value={sf.flsMax} onChange={e=>setSF(p=>({...p,flsMax:e.target.value}))}/>{[["notFirst",t.notFirst],["notLast",t.notLast]].map(([k,lb])=><button key={k} onClick={()=>setSF(p=>({...p,[k]:!p[k]}))} style={{padding:"6px 12px",borderRadius:16,border:sf[k]?"2px solid #e8543e":"1.5px solid #e0dfe6",background:sf[k]?"#fef0ed":"#fff",color:sf[k]?"#e8543e":"#777",cursor:"pointer",fontSize:12,fontWeight:600}}>{lb}</button>)}</div>
          <div style={{color:"#888",fontWeight:600}}>{t.condition}</div>
          <div style={{display:"flex",gap:4}}>{["condNew","condGood","condRepair"].map(v=><button key={v} onClick={()=>setSF(p=>({...p,cond:p.cond===v?"":v}))} style={{padding:"6px 12px",borderRadius:16,border:sf.cond===v?"2px solid #e8543e":"1.5px solid #e0dfe6",background:sf.cond===v?"#fef0ed":"#fff",color:sf.cond===v?"#e8543e":"#777",cursor:"pointer",fontSize:12,fontWeight:600}}>{t[v]}</button>)}</div>
          <div style={{color:"#888",fontWeight:600}}>{t.wallType}</div>
          <div style={{display:"flex",gap:4}}>{["brick","panel","monolith"].map(v=><button key={v} onClick={()=>setSF(p=>({...p,wall:p.wall===v?"":v}))} style={{padding:"6px 12px",borderRadius:16,border:sf.wall===v?"2px solid #e8543e":"1.5px solid #e0dfe6",background:sf.wall===v?"#fef0ed":"#fff",color:sf.wall===v?"#e8543e":"#777",cursor:"pointer",fontSize:12,fontWeight:600}}>{t[v]}</button>)}</div>
          <div style={{color:"#888",fontWeight:600}}>{t.features}</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{["terrace","balcony","elevator","parking","studio","multiLevel","penthouse"].map(v=><button key={v} onClick={()=>setSF(p=>({...p,[v]:!p[v]}))} style={{padding:"6px 12px",borderRadius:16,border:sf[v]?"2px solid #e8543e":"1.5px solid #e0dfe6",background:sf[v]?"#fef0ed":"#fff",color:sf[v]?"#e8543e":"#777",cursor:"pointer",fontSize:12,fontWeight:600}}>{t[v]}</button>)}</div>
          <div style={{color:"#888",fontWeight:600}}>{t.yearBuilt}</div>
          <div style={{display:"flex",gap:6,maxWidth:300}}><input style={INP} type="number" placeholder={t.from.toLowerCase()} value={sf.yrMin} onChange={e=>setSF(p=>({...p,yrMin:e.target.value}))}/><input style={INP} type="number" placeholder={t.to.toLowerCase()} value={sf.yrMax} onChange={e=>setSF(p=>({...p,yrMax:e.target.value}))}/></div>
          <div style={{color:"#888",fontWeight:600}}>{t.heating}</div>
          <div style={{display:"flex",gap:4}}>{["heatCent","heatAuto"].map(v=><button key={v} onClick={()=>setSF(p=>({...p,heat:p.heat===v?"":v}))} style={{padding:"6px 12px",borderRadius:16,border:sf.heat===v?"2px solid #e8543e":"1.5px solid #e0dfe6",background:sf.heat===v?"#fef0ed":"#fff",color:sf.heat===v?"#e8543e":"#777",cursor:"pointer",fontSize:12,fontWeight:600}}>{t[v]}</button>)}</div>
        </div>
        <div style={{display:"flex",gap:12,marginTop:18,justifyContent:"center"}}><button onClick={()=>setOpenDD(null)} style={{padding:"10px 40px",borderRadius:20,border:"none",background:"#e8543e",color:"#fff",cursor:"pointer",fontSize:14,fontWeight:700}}>{t.showN}</button><button onClick={()=>setSF({areaMin:"",areaMax:"",flMin:"",flMax:"",flsMin:"",flsMax:"",yrMin:"",yrMax:"",cond:"",heat:"",wall:"",notFirst:false,notLast:false,terrace:false,balcony:false,elevator:false,parking:false,studio:false,multiLevel:false,penthouse:false})} style={{padding:"10px 30px",borderRadius:20,border:"1.5px solid #e0dfe6",background:"#fff",color:"#555",cursor:"pointer",fontSize:14,fontWeight:600}}>{t.resetF}</button></div>
      </div>}
    </div>
  </div>;
}

/* ═══ Toolbar + Cards + Detail + Static sections (same as before, compact) ═══ */
function Toolbar({t,sort,setSort,vm,setVm}){return<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:10,flexWrap:"wrap"}}><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{[["newest",t.sortNew],["priceLow",t.sortPL],["priceHigh",t.sortPH],["area",t.sortA]].map(([k,lb])=><button key={k} onClick={()=>setSort(k)} style={{padding:"5px 10px",borderRadius:5,border:"1px solid "+(sort===k?"#e8543e":"#ddd"),background:sort===k?"#fef0ed":"#fff",color:sort===k?"#e8543e":"#777",cursor:"pointer",fontSize:11,fontWeight:600}}>{lb}</button>)}</div><div style={{display:"flex",gap:1,background:"#eee",borderRadius:6,padding:1}}>{["grid_view","view_list"].map((ic,i)=>{const k=i?"list":"grid";return<button key={k} onClick={()=>setVm(k)} style={{padding:"5px 8px",border:"none",borderRadius:5,background:vm===k?"#fff":"transparent",cursor:"pointer",display:"flex",alignItems:"center"}}><IC n={ic} s={16} style={{color:vm===k?"#e8543e":"#aaa"}}/></button>})}</div></div>}

function Card({l,t,d=0,onO}){const[h,sH]=useState(false);const sx=l.op==="rent"?t.mo:l.op==="daily"?t.day:"";const pm=l.area>0?~~(l.price/l.area):0;return<div onClick={()=>onO(l)} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} style={{borderRadius:12,overflow:"hidden",background:"#fff",boxShadow:h?"0 16px 40px rgba(0,0,0,.11)":"0 1px 8px rgba(0,0,0,.05)",transform:h?"translateY(-4px)":"none",transition:"all .3s",cursor:"pointer",animation:`fadeUp .4s ${d}s cubic-bezier(.4,0,.2,1) both`}}><div style={{position:"relative",paddingTop:"60%",overflow:"hidden",background:"#e8e7ee"}}><img src={l.img} alt="" loading="lazy" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",transform:h?"scale(1.05)":"scale(1)",transition:"transform .5s"}}/><Tg tag={l.tag} t={t}/><div style={{position:"absolute",top:8,right:8,zIndex:2}}><Fv/></div><div style={{position:"absolute",bottom:0,left:0,right:0,height:80,background:"linear-gradient(transparent,rgba(0,0,0,.5))"}}/><div style={{position:"absolute",bottom:12,left:14}}><div style={{fontSize:22,...B,color:"#fff"}}>{l.cur}{l.price.toLocaleString()}<span style={{fontSize:12,fontWeight:500,opacity:.8}}>{sx}</span></div>{pm>0&&l.op==="buy"&&<div style={{fontSize:10,color:"rgba(255,255,255,.65)"}}>{l.cur}{pm}{t.pm2}</div>}</div></div><div style={{padding:"14px 16px 16px"}}><div style={{fontSize:15,fontWeight:700,marginBottom:2}}>{t[l.type]}</div><div style={{fontSize:12,color:"#999",marginBottom:10,display:"flex",alignItems:"center",gap:3}}><IC n="location_on" s={13} style={{color:"#ccc"}}/>{l.street}, {l.city}</div><div style={{display:"flex",gap:12,fontSize:12,color:"#777"}}>{l.rooms>0&&<span style={{display:"flex",alignItems:"center",gap:2}}><IC n="bed" s={14} style={{color:"#bbb"}}/>{l.rooms}</span>}<span style={{display:"flex",alignItems:"center",gap:2}}><IC n="square_foot" s={14} style={{color:"#bbb"}}/>{l.area}{t.m2}</span>{l.floor>0&&<span style={{display:"flex",alignItems:"center",gap:2}}><IC n="stairs" s={14} style={{color:"#bbb"}}/>{l.floor}/{l.tfl}</span>}</div></div></div>}

function LCard({l,t,onO}){const[h,sH]=useState(false);const sx=l.op==="rent"?t.mo:l.op==="daily"?t.day:"";return<div className="lc" onClick={()=>onO(l)} onMouseEnter={()=>sH(true)} onMouseLeave={()=>sH(false)} style={{display:"flex",borderRadius:12,overflow:"hidden",background:"#fff",boxShadow:h?"0 10px 28px rgba(0,0,0,.09)":"0 1px 8px rgba(0,0,0,.05)",cursor:"pointer",marginBottom:12}}><div className="lci" style={{width:240,minWidth:240,position:"relative",overflow:"hidden",background:"#e8e7ee"}}><img src={l.img} alt="" loading="lazy" style={{width:"100%",height:"100%",minHeight:150,objectFit:"cover"}}/><Tg tag={l.tag} t={t}/></div><div style={{flex:1,padding:"14px 18px",display:"flex",flexDirection:"column",justifyContent:"center"}}><div style={{fontSize:20,...B,color:"#e8543e"}}>{l.cur}{l.price.toLocaleString()}<span style={{fontSize:12,fontWeight:500,color:"#999"}}>{sx}</span></div><div style={{fontSize:14,fontWeight:700,marginTop:5}}>{t[l.type]}</div><div style={{fontSize:12,color:"#999",marginTop:2}}>{l.street}, {l.city}</div><div style={{display:"flex",gap:12,fontSize:12,color:"#777",marginTop:6}}>{l.rooms>0&&<span>{l.rooms} {t.rooms.toLowerCase()}</span>}<span>{l.area}{t.m2}</span>{l.floor>0&&<span>{t.floor} {l.floor}/{l.tfl}</span>}</div></div></div>}

function Mini({l,t,act,onClick}){return<div onClick={onClick} style={{display:"flex",gap:8,padding:8,borderRadius:8,cursor:"pointer",background:act?"#fff":"transparent",border:act?"2px solid #e8543e":"2px solid transparent",marginBottom:3}}><div style={{width:80,height:56,borderRadius:6,overflow:"hidden",background:"#e8e7ee",flexShrink:0}}><img src={l.img} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div><div style={{flex:1,minWidth:0,fontSize:12}}><div style={{...B,fontSize:13,color:"#e8543e"}}>{l.cur}{l.price.toLocaleString()}</div><div style={{fontWeight:600,marginTop:1}}>{t[l.type]}</div><div style={{color:"#999",marginTop:1}}>{l.city}</div></div></div>}

function Gal({imgs,t}){const[i,sI]=useState(0);const btn={position:"absolute",top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",border:"none",background:"rgba(0,0,0,.35)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:3};return<div style={{position:"relative",borderRadius:12,overflow:"hidden",background:"#111"}}><img src={imgs[i]} alt="" style={{width:"100%",height:380,objectFit:"cover",display:"block"}}/><button onClick={()=>sI(x=>x>0?x-1:imgs.length-1)} style={{...btn,left:10}}><IC n="chevron_left" s={22} style={{color:"#fff"}}/></button><button onClick={()=>sI(x=>x<imgs.length-1?x+1:0)} style={{...btn,right:10}}><IC n="chevron_right" s={22} style={{color:"#fff"}}/></button><div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.45)",borderRadius:16,padding:"4px 10px",fontSize:11,color:"#fff"}}>{i+1} {t.pOf} {imgs.length}</div></div>}

function Sim({l,t,onO}){const s=useMemo(()=>D.filter(x=>x.id!==l.id&&x.type===l.type&&x.op===l.op).slice(0,3),[l.id]);if(!s.length)return null;return<div style={{marginTop:24}}><h3 style={{fontSize:15,...B,marginBottom:12}}>{t.similar}</h3><div className="similar-g" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>{s.map(x=><div key={x.id} onClick={()=>onO(x)} style={{borderRadius:9,overflow:"hidden",background:"#fff",border:"1px solid #eee",cursor:"pointer"}}><div style={{height:100,overflow:"hidden",background:"#e8e7ee"}}><img src={x.img} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div><div style={{padding:"8px 10px"}}><div style={{fontSize:14,...B,color:"#e8543e"}}>{x.cur}{x.price.toLocaleString()}</div><div style={{fontSize:11,marginTop:2}}>{t[x.type]}, {x.city}</div></div></div>)}</div></div>}

function Det({l,t,onClose,mob,onO}){const sx=l.op==="rent"?t.mo:l.op==="daily"?t.day:"";const il=l.type==="land";const pm=l.area>0?~~(l.price/l.area):0;
const c=<div style={{padding:mob?14:0}}><button onClick={onClose} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",border:"none",background:"none",cursor:"pointer",fontSize:13,fontWeight:600,color:"#e8543e",marginBottom:10}}><IC n="arrow_back" s={16} style={{color:"#e8543e"}}/>{t.back}</button><Gal imgs={l.imgs} t={t}/><div style={{padding:"18px 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"start",gap:10,marginBottom:16}}><div><div style={{fontSize:28,...B,color:"#e8543e"}}>{l.cur}{l.price.toLocaleString()}<span style={{fontSize:14,fontWeight:500,color:"#999"}}>{sx}</span></div>{pm>0&&l.op==="buy"&&<div style={{fontSize:12,color:"#aaa"}}>{l.cur}{pm}{t.pm2}</div>}<h2 style={{fontSize:18,fontWeight:700,marginTop:5}}>{t[l.type]} — {l.street}</h2><div style={{fontSize:13,color:"#999",marginTop:2}}>{l.city}, Albania</div></div><Fv sz={36}/></div>{!il&&<div style={{display:"flex",borderRadius:10,border:"1px solid #eee",overflow:"hidden",marginBottom:20}}>{[{lb:t.rooms,v:l.rooms,i:"bed"},{lb:t.area,v:`${l.area}${t.m2}`,i:"square_foot"},{lb:t.floor,v:`${l.floor}/${l.tfl}`,i:"stairs"},{lb:t.yearBuilt,v:l.year,i:"calendar_month"}].map((x,i,a)=><div key={i} style={{flex:1,textAlign:"center",padding:"12px 4px",borderRight:i<a.length-1?"1px solid #eee":"none"}}><IC n={x.i} s={16} style={{color:"#ccc",display:"block",margin:"0 auto 3px"}}/><div style={{fontSize:16,fontWeight:700}}>{x.v}</div><div style={{fontSize:10,color:"#999"}}>{x.lb}</div></div>)}</div>}<div style={{marginBottom:20}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:7}}>{t.desc}</h3><p style={{fontSize:13,color:"#555",lineHeight:1.7}}>{t.descTxt}</p></div>{!il&&<div style={{marginBottom:20}}><h3 style={{fontSize:15,fontWeight:700,marginBottom:8}}>{t.chars}</h3><div style={{borderRadius:9,border:"1px solid #eee",overflow:"hidden"}}>{[[t.area,`${l.area}${t.m2}`],[t.rooms,l.rooms],[t.floor,`${l.floor}/${l.tfl}`],[t.yearBuilt,l.year],[t.heating,t[l.heat]||"—"],[t.condition,t[l.cond]||"—"]].map(([lb,v],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"9px 12px",background:i%2?"#fff":"#fafafa",borderBottom:i<5?"1px solid #f0eff5":"none",fontSize:12}}><span style={{color:"#888"}}>{lb}</span><span style={{fontWeight:600}}>{v}</span></div>)}</div></div>}<div style={{background:"#fafafa",borderRadius:10,padding:"16px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:16}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:42,height:42,borderRadius:"50%",background:"linear-gradient(135deg,#e8543e,#c0392b)",display:"flex",alignItems:"center",justifyContent:"center"}}><IC n="person" s={20} style={{color:"#fff"}}/></div><div><div style={{fontSize:14,fontWeight:700}}>{l.name}</div><div style={{fontSize:11,color:"#999"}}>{l.isAg?t.agent:t.seller}</div></div></div><div style={{display:"flex",gap:6}}><button style={{padding:"8px 18px",borderRadius:7,border:"none",background:"linear-gradient(135deg,#e8543e,#c0392b)",color:"#fff",cursor:"pointer",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:4}}><IC n="call" s={15} style={{color:"#fff"}}/>{t.call}</button><button style={{padding:"8px 18px",borderRadius:7,border:"1px solid #ddd",background:"#fff",cursor:"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}><IC n="mail" s={15} style={{color:"#aaa"}}/>{t.msg}</button></div></div><div style={{fontSize:10,color:"#bbb"}}>ID:{l.id} · {l.days}d · {l.views} {t.views}</div><Sim l={l} t={t} onO={onO}/></div></div>;
if(mob)return<div className="mob-d">{c}</div>;return<div style={{animation:"slideInRight .25s cubic-bezier(.4,0,.2,1) both"}}>{c}</div>}

function Res({ls,t,sel,setSel,mob,vm}){const ref=useRef();useEffect(()=>{if(sel&&ref.current)ref.current.scrollTop=0},[sel]);if(!ls.length)return<div style={{textAlign:"center",padding:"50px",color:"#aaa"}}>{t.noRes}</div>;if(!sel){if(vm==="list")return<div>{ls.map(l=><LCard key={l.id} l={l} t={t} onO={setSel}/>)}</div>;return<div className="grid-r" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:20}}>{ls.map((l,i)=><Card key={l.id} l={l} t={t} d={Math.min(i*.05,.4)} onO={setSel}/>)}</div>}if(mob)return<div>{vm==="list"?ls.map(l=><LCard key={l.id} l={l} t={t} onO={setSel}/>):<div className="grid-r" style={{display:"grid",gridTemplateColumns:"1fr",gap:20}}>{ls.map(l=><Card key={l.id} l={l} t={t} d={0} onO={setSel}/>)}</div>}<Det l={sel} t={t} onClose={()=>setSel(null)} mob onO={setSel}/></div>;return<div style={{display:"flex",gap:16,minHeight:500}}><div className="split-list" style={{width:"28%",flexShrink:0,maxHeight:"calc(100vh - 80px)",overflowY:"auto",position:"sticky",top:80}}>{ls.map(l=><Mini key={l.id} l={l} t={t} act={l.id===sel.id} onClick={()=>setSel(l)}/>)}</div><div className="split-detail" ref={ref} style={{flex:1,minWidth:0}}><Det l={sel} t={t} onClose={()=>setSel(null)} mob={false} onO={setSel}/></div></div>}

function Cities({t}){const cn=[1240,890,720,560,430,380];return<section style={{maxWidth:1280,margin:"0 auto",padding:"56px 24px"}}><h2 style={{fontSize:26,...B,marginBottom:28}}>{t.popCities}</h2><div className="grid-cities" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>{CITIES.slice(0,6).map((n,i)=><div key={n} style={{position:"relative",borderRadius:12,overflow:"hidden",paddingTop:i<2?"52%":"62%",cursor:"pointer"}}><img src={CT[i]} alt={n} loading="lazy" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 30%,rgba(0,0,0,.6))"}}/><div style={{position:"absolute",bottom:14,left:16}}><div style={{color:"#fff",fontSize:18,...B}}>{n}</div><div style={{color:"rgba(255,255,255,.6)",fontSize:12}}>{cn[i]} {t.sL.toLowerCase()}</div></div></div>)}</div></section>}
function About({t}){const items=[{i:"verified_user",ti:t.a1,d:t.a1d,bg:"#e6f7ed"},{i:"map",ti:t.a2,d:t.a2d,bg:"#e8f0fe"},{i:"language",ti:t.a3,d:t.a3d,bg:"#fef3e6"},{i:"handshake",ti:t.a4,d:t.a4d,bg:"#f3e8fe"}];return<section style={{background:"linear-gradient(#f5f4fa,#eeedf5)",padding:"56px 24px"}}><div style={{maxWidth:1280,margin:"0 auto"}}><h2 style={{textAlign:"center",fontSize:26,...B,marginBottom:36}}>{t.about}</h2><div className="grid-about" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:16}}>{items.map((x,i)=><div key={i} style={{background:"#fff",borderRadius:12,padding:"24px 20px"}}><div style={{width:46,height:46,borderRadius:11,background:x.bg,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14}}><IC n={x.i} s={22} style={{color:"#555"}}/></div><div style={{fontSize:16,fontWeight:700,marginBottom:6}}>{x.ti}</div><div style={{fontSize:13,color:"#888",lineHeight:1.6}}>{x.d}</div></div>)}</div></div></section>}
function Footer({t}){return<footer style={{background:"#0e0e1e",color:"rgba(255,255,255,.45)",padding:"44px 24px 28px"}}><div className="footer-inner" style={{maxWidth:1280,margin:"0 auto",display:"flex",flexWrap:"wrap",gap:40,justifyContent:"space-between"}}><div style={{flex:"1 1 260px"}}><div style={{fontSize:22,...B,color:"#fff",marginBottom:10}}>{t.brand}</div><p style={{fontSize:13,lineHeight:1.6,maxWidth:300}}>{t.fD}</p></div><div style={{flex:"1 1 120px"}}><div style={{fontWeight:700,color:"#fff",fontSize:13,marginBottom:14}}>{t.fN}</div><div style={{display:"flex",flexDirection:"column",gap:8,fontSize:13}}><a href="#">{t.buy}</a><a href="#">{t.rent}</a><a href="#">{t.daily}</a></div></div><div style={{flex:"1 1 160px"}}><div style={{fontWeight:700,color:"#fff",fontSize:13,marginBottom:14}}>{t.fC}</div><div style={{display:"flex",flexDirection:"column",gap:8,fontSize:13}}><span>info@shtepi.al</span><span>+355 69 123 4567</span><span>Tiranë, Albania</span></div></div></div><div style={{maxWidth:1280,margin:"28px auto 0",paddingTop:20,borderTop:"1px solid rgba(255,255,255,.06)",fontSize:12,textAlign:"center"}}>© 2026 Shtëpi.al — {t.fR}</div></footer>}

function App(){
  const[lang,setLang]=useState("sq");
  const[opTab,setOpTab]=useState("buy");
  const[loc,setLoc]=useState(""); // location search
  const[f,setF]=useState({type:"",pMin:"",pMax:"",rooms:[]});
  const[sf,setSF]=useState({areaMin:"",areaMax:"",flMin:"",flMax:"",flsMin:"",flsMax:"",yrMin:"",yrMax:"",cond:"",heat:"",wall:"",notFirst:false,notLast:false,terrace:false,balcony:false,elevator:false,parking:false,studio:false,multiLevel:false,penthouse:false});
  const[sel,setSel]=useState(null);
  const[sort,setSort]=useState("newest");
  const[vm,setVm]=useState("grid");
  const mob=useMob();
  const t=TT[lang];

  const filtered=useMemo(()=>{
    let r=D.filter(l=>{
      if(l.op!==opTab)return false;
      if(f.type&&l.type!==f.type)return false;
      // Location: match city or street containing the search term
      if(loc&&!l.city.toLowerCase().includes(loc.toLowerCase())&&!l.street.toLowerCase().includes(loc.toLowerCase()))return false;
      if(f.pMin&&l.price<+f.pMin)return false;
      if(f.pMax&&l.price>+f.pMax)return false;
      if(f.rooms.length&&!f.rooms.some(v=>v===4?l.rooms>=4:l.rooms===v))return false;
      if(sf.areaMin&&l.area<+sf.areaMin)return false;
      if(sf.areaMax&&l.area>+sf.areaMax)return false;
      if(sf.flMin&&l.floor<+sf.flMin)return false;
      if(sf.flMax&&l.floor>+sf.flMax)return false;
      if(sf.flsMin&&l.tfl<+sf.flsMin)return false;
      if(sf.flsMax&&l.tfl>+sf.flsMax)return false;
      if(sf.yrMin&&l.year<+sf.yrMin)return false;
      if(sf.yrMax&&l.year>+sf.yrMax)return false;
      if(sf.cond&&l.cond!==sf.cond)return false;
      if(sf.heat&&l.heat!==sf.heat)return false;
      if(sf.wall&&l.wall!==sf.wall)return false;
      if(sf.notFirst&&l.floor===1)return false;
      if(sf.notLast&&l.floor===l.tfl)return false;
      if(sf.balcony&&!l.hasBal)return false;
      if(sf.elevator&&!l.hasElev)return false;
      if(sf.parking&&!l.hasPark)return false;
      return true;
    });
    if(sort==="priceLow")r=[...r].sort((a,b)=>a.price-b.price);
    else if(sort==="priceHigh")r=[...r].sort((a,b)=>b.price-a.price);
    else if(sort==="area")r=[...r].sort((a,b)=>b.area-a.area);
    return r;
  },[opTab,f,sf,sort,loc]);

  useEffect(()=>{setSel(null)},[opTab,f,sf,loc]);

  return<div>
    <Header lang={lang} setLang={setLang} t={t}/>
    <Hero t={t}/>
    <FilterBar t={t} f={f} sf={sf} opTab={opTab} setOpTab={setOpTab} setF={setF} setSF={setSF} loc={loc} setLoc={setLoc}/>
    <section style={{maxWidth:1280,margin:"0 auto",padding:"40px 24px"}}>
      <h2 style={{fontSize:22,...B,marginBottom:16}}>{t.results} <span style={{fontSize:15,fontWeight:500,color:"#aaa"}}>({filtered.length})</span></h2>
      <Toolbar t={t} sort={sort} setSort={setSort} vm={vm} setVm={setVm}/>
      <Res ls={filtered} t={t} sel={sel} setSel={setSel} mob={mob} vm={vm}/>
    </section>
    {!sel&&<><Cities t={t}/><About t={t}/></>}
    <Footer t={t}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
