function generateListings() {
  const types = ["apartment","house","villa","land","commercial"];
  const tags = ["verified","newBuild","priceReduced",""];
  const listings = [];
  for (let i = 0; i < 24; i++) {
    const opType = i < 16 ? "buy" : i < 22 ? "rent" : "daily";
    const propType = types[i % types.length];
    const isLand = propType === "land";
    const basePrice = { villa:180000, house:95000, land:35000, commercial:120000, apartment:55000 }[propType];
    const price = opType === "buy" ? basePrice + Math.floor(Math.random()*80000)
      : opType === "rent" ? 300 + Math.floor(Math.random()*700)
      : 30 + Math.floor(Math.random()*90);
    listings.push({
      id: i+1, photo: PHOTOS[i % PHOTOS.length], city: CITIES[i % CITIES.length],
      street: STREETS[i % STREETS.length], type: propType, opType, price, currency: "€",
      rooms: isLand ? 0 : 1+Math.floor(Math.random()*4),
      area: isLand ? 200+Math.floor(Math.random()*800) : 40+Math.floor(Math.random()*160),
      floor: isLand ? 0 : 1+Math.floor(Math.random()*9),
      totalFloors: isLand ? 0 : 3+Math.floor(Math.random()*9),
      tag: tags[i % tags.length],
    });
  }
  return listings;
}
const ALL_LISTINGS = generateListings();

          {tabs.map(tb => (

              flex: 1, padding: "15px 0", border: "none", cursor: "pointer", fontSize: 15, fontWeight: 600,
              fontFamily: "inherit",
              background: opTab === tb.key ? "#fff" : "#faf9fe",
              color: opTab === tb.key ? "#e8543e" : "#999",
              borderBottom: opTab === tb.key ? "3px solid #e8543e" : "3px solid transparent",
              transition: "all .2s",
            }}>{tb.label}</button>
          ))}
        </div>
        <div className="search-filters" style={{ padding: "20px 24px 24px", display: "flex", gap: 12, flexWrap: "wrap", alignItems: "end" }}>
          <div style={{ flex: "1 1 155px", minWidth: 140 }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: "#aaa", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{t.city}</label>
            <select style={s} value={filters.city} onChange={e => setFilters(f => ({...f, city: e.target.value}))}>
              <option value="">{t.allCities}</option>
              {CITIES.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={{ flex: "1 1 155px", minWidth: 140 }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: "#aaa", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{t.type}</label>
            <select style={s} value={filters.type} onChange={e => setFilters(f => ({...f, type: e.target.value}))}>
              <option value="">{t.allTypes}</option>
              {["apartment","house","villa","land","commercial"].map(tp => <option key={tp} value={tp}>{t[tp]}</option>)}
            </select>
          </div>
          <div style={{ flex: "1 1 115px", minWidth: 100 }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: "#aaa", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{t.priceFrom}</label>
            <input style={s} type="number" placeholder="€" value={filters.priceFrom} onChange={e => setFilters(f => ({...f, priceFrom: e.target.value}))} />
          </div>
          <div style={{ flex: "1 1 115px", minWidth: 100 }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: "#aaa", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{t.priceTo}</label>
            <input style={s} type="number" placeholder="€" value={filters.priceTo} onChange={e => setFilters(f => ({...f, priceTo: e.target.value}))} />
          </div>
          <div style={{ flex: "1 1 95px", minWidth: 85 }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: "#aaa", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{t.rooms}</label>
            <select style={s} value={filters.rooms} onChange={e => setFilters(f => ({...f, rooms: e.target.value}))}>
              <option value="">{t.any}</option>
              {[1,2,3,4,5].map(r => <option key={r} value={r}>{r}+</option>)}
            </select>
          </div>
          <div style={{ flex: "1 1 115px", minWidth: 100 }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: "#aaa", display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{t.area}</label>
            <input style={s} type="number" placeholder="m²" value={filters.area} onChange={e => setFilters(f => ({...f, area: e.target.value}))} />
          </div>
          <div style={{ display: "flex", gap: 8, paddingTop: 18 }}>
            <button onClick={() => setFilters({city:"",type:"",priceFrom:"",priceTo:"",rooms:"",area:""})} style={{
              padding: "11px 18px", borderRadius: 8, border: "1px solid #e0dfe6",
              background: "#faf9fe", color: "#888", cursor: "pointer", fontSize: 14, fontWeight: 600, fontFamily: "inherit",
            }}>{t.reset}</button>
            <button style={{
              padding: "11px 30px", borderRadius: 8, border: "none",
              background: "linear-gradient(135deg, #e8543e, #c0392b)", color: "#fff",
              cursor: "pointer", fontSize: 15, fontWeight: 700, fontFamily: "inherit",
              boxShadow: "0 4px 16px rgba(232,84,62,0.25)",
            }}>{t.search}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TagBadge({ tag, t }) {
  if (!tag) return null;
  const map = {
    verified: { bg: "#e6f7ed", color: "#1a8c4e", icon: "✓" },
    newBuild: { bg: "#e8f0fe", color: "#2a5bd7", icon: "★" },
    priceReduced: { bg: "#fef3e6", color: "#d4822c", icon: "↓" },
  };
  const m = map[tag]; if (!m) return null;
  return (
    <span style={{
      position: "absolute", top: 12, left: 12, padding: "5px 10px", borderRadius: 7,
      fontSize: 11, fontWeight: 700, background: m.bg, color: m.color, letterSpacing: "0.02em",
      display: "flex", alignItems: "center", gap: 4,
    }}>{m.icon} {t[tag]}</span>
  );
}

function FavButton() {
  const [fav, setFav] = useState(false);
  return (
    <button onClick={(e) => { e.stopPropagation(); setFav(!fav); }} style={{
      position: "absolute", top: 12, right: 12, width: 34, height: 34, borderRadius: "50%",
      border: "none", background: "rgba(255,255,255,0.85)", cursor: "pointer",
      display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16,
      backdropFilter: "blur(8px)", transition: "transform .2s",
      transform: fav ? "scale(1.15)" : "scale(1)",
    }}>{fav ? "❤️" : "🤍"}</button>
  );
}

function PropertyCard({ listing, t, delay }) {
  const [hov, setHov] = useState(false);
  const priceSuffix = listing.opType === "rent" ? t.perMonth : listing.opType === "daily" ? t.perDay : "";
  return (
    <div
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        borderRadius: 14, overflow: "hidden", background: "#fff",
        boxShadow: hov ? "0 20px 48px rgba(0,0,0,0.12)" : "0 2px 12px rgba(0,0,0,0.05)",
        transform: hov ? "translateY(-6px)" : "none",
        transition: "all .35s cubic-bezier(.4,0,.2,1)",
        cursor: "pointer", animation: `fadeUp 0.5s ${delay}s cubic-bezier(.4,0,.2,1) both`,
      }}
    >
      <div style={{ position: "relative", paddingTop: "62%", overflow: "hidden" }}>
        <img src={listing.photo} alt={listing.street} loading="lazy" style={{
          position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover",
          transform: hov ? "scale(1.06)" : "scale(1)",
          transition: "transform .6s cubic-bezier(.4,0,.2,1)",
        }} />
        <TagBadge tag={listing.tag} t={t} />
        <FavButton />
        <div style={{
          position: "absolute", bottom: 0, left: 0, right: 0, height: 90,
          background: "linear-gradient(transparent, rgba(0,0,0,0.55))",
        }} />
        <div style={{ position: "absolute", bottom: 14, left: 16 }}>
          <div style={{ fontSize: 24, fontWeight: 800, color: "#fff", fontFamily: "'Playfair Display', serif", textShadow: "0 2px 8px rgba(0,0,0,0.3)" }}>
            {listing.currency}{listing.price.toLocaleString()}
            <span style={{ fontSize: 13, fontWeight: 500, opacity: 0.85 }}>{priceSuffix}</span>
          </div>
        </div>
      </div>
      <div style={{ padding: "16px 18px 18px" }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: "#1a1a2e", marginBottom: 3 }}>{t[listing.type]}</div>
        <div style={{ fontSize: 13, color: "#999", marginBottom: 14 }}>{listing.street}, {listing.city}</div>
        <div style={{ display: "flex", gap: 14, fontSize: 13, color: "#666" }}>
          {listing.rooms > 0 && <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 7v11a2 2 0 002 2h14a2 2 0 002-2V7"/><path d="M21 7H3l2-4h14l2 4z"/><path d="M7 20v-4h10v4"/></svg>
            {listing.rooms} {t.roomsShort}
          </span>}
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 3v18"/></svg>
            {listing.area} {t.m2}
          </span>
          {listing.floor > 0 && <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22V2M4 7h16M4 12h16M4 17h16"/></svg>
            {listing.floor}/{listing.totalFloors}
          </span>}
        </div>
      </div>
    </div>
  );
}

function Results({ listings, t }) {
  if (listings.length === 0) {
    return <div style={{ textAlign: "center", padding: "60px 24px", color: "#999", fontSize: 16 }}>{t.noResults}</div>;
  }
  return (
    <div className="grid-results" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 24 }}>
      {listings.map((l, i) => <PropertyCard key={l.id} listing={l} t={t} delay={Math.min(i * 0.06, 0.5)} />)}
    </div>
  );
}

function PopularCities({ t }) {
  const top6 = CITIES.slice(0, 6);
  const counts = [1240, 890, 720, 560, 430, 380];
  return (
    <section style={{ maxWidth: 1280, margin: "0 auto", padding: "64px 24px" }}>
      <h2 style={{ fontSize: 28, fontWeight: 800, color: "#1a1a2e", fontFamily: "'Playfair Display', serif", marginBottom: 32 }}>{t.popularCities}</h2>
      <div className="grid-cities" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
        {top6.map((name, i) => (
          <div key={name} style={{
            position: "relative", borderRadius: 14, overflow: "hidden", paddingTop: i < 2 ? "55%" : "65%",
            cursor: "pointer", gridColumn: i < 2 ? "span 1" : undefined,
          }}>
            <img src={CITY_PHOTOS[i]} alt={name} loading="lazy" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", transition: "transform .5s" }} />
            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(transparent 30%, rgba(0,0,0,0.6))" }} />
            <div style={{ position: "absolute", bottom: 16, left: 18 }}>
              <div style={{ color: "#fff", fontSize: 20, fontWeight: 700, fontFamily: "'Playfair Display', serif" }}>{name}</div>
              <div style={{ color: "rgba(255,255,255,0.65)", fontSize: 13, marginTop: 2 }}>{counts[i]} {t.statsListings.toLowerCase()}</div>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

function About({ t }) {
  const items = [
    { icon: "✓", title: t.about1title, desc: t.about1desc, color: "#e6f7ed" },
    { icon: "🗺", title: t.about2title, desc: t.about2desc, color: "#e8f0fe" },
    { icon: "🌍", title: t.about3title, desc: t.about3desc, color: "#fef3e6" },
    { icon: "🤝", title: t.about4title, desc: t.about4desc, color: "#f3e8fe" },
  ];
  return (
    <section style={{ background: "linear-gradient(180deg, #f6f5fb, #eeedf5)", padding: "64px 24px" }}>
      <div style={{ maxWidth: 1280, margin: "0 auto" }}>
        <h2 style={{ textAlign: "center", fontSize: 28, fontWeight: 800, color: "#1a1a2e", fontFamily: "'Playfair Display', serif", marginBottom: 40 }}>{t.aboutTitle}</h2>
        <div className="grid-about" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))", gap: 20 }}>
          {items.map((it, i) => (
            <div key={i} style={{
              background: "#fff", borderRadius: 14, padding: "28px 24px",
              boxShadow: "0 2px 12px rgba(0,0,0,0.04)",
              transition: "transform .25s", cursor: "default",
            }}>
              <div style={{
                width: 50, height: 50, borderRadius: 13, background: it.color,
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, marginBottom: 16,
              }}>{it.icon}</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: "#1a1a2e", marginBottom: 8 }}>{it.title}</div>
              <div style={{ fontSize: 14, color: "#777", lineHeight: 1.65 }}>{it.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Footer({ t }) {
  return (
    <footer style={{ background: "#0e0e1e", color: "rgba(255,255,255,0.5)", padding: "48px 24px 32px" }}>
      <div className="footer-inner" style={{ maxWidth: 1280, margin: "0 auto", display: "flex", flexWrap: "wrap", gap: 48, justifyContent: "space-between" }}>
        <div style={{ flex: "1 1 280px" }}>
          <div style={{ fontSize: 24, fontWeight: 800, color: "#fff", fontFamily: "'Playfair Display', serif", marginBottom: 12 }}>{t.brand}</div>
          <p style={{ fontSize: 14, lineHeight: 1.7, maxWidth: 320 }}>{t.footerDesc}</p>
        </div>
        <div style={{ flex: "1 1 140px" }}>
          <div style={{ fontWeight: 700, color: "#fff", fontSize: 14, marginBottom: 16 }}>{t.footerNav}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, fontSize: 14 }}>
            <a href="#">{t.buy}</a><a href="#">{t.rent}</a><a href="#">{t.daily}</a><a href="#">{t.addListing}</a>
          </div>
        </div>
        <div style={{ flex: "1 1 180px" }}>
          <div style={{ fontWeight: 700, color: "#fff", fontSize: 14, marginBottom: 16 }}>{t.footerContact}</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, fontSize: 14 }}>
            <span>info@shtepi.al</span><span>+355 69 123 4567</span><span>Tiranë, Albania</span>
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 1280, margin: "32px auto 0", paddingTop: 24, borderTop: "1px solid rgba(255,255,255,0.06)", fontSize: 13, textAlign: "center" }}>
        © 2026 Shtëpi.al — {t.footerRights}
      </div>
    </footer>
  );
}

// ─── App ──────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState("uk");
  const [opTab, setOpTab] = useState("buy");
  const [filters, setFilters] = useState({ city: "", type: "", priceFrom: "", priceTo: "", rooms: "", area: "" });
  const t = T[lang];

  const filtered = useMemo(() => ALL_LISTINGS.filter(l => {
    if (l.opType !== opTab) return false;
    if (filters.city && l.city !== filters.city) return false;
    if (filters.type && l.type !== filters.type) return false;
    if (filters.priceFrom && l.price < Number(filters.priceFrom)) return false;
    if (filters.priceTo && l.price > Number(filters.priceTo)) return false;
    if (filters.rooms && l.rooms < Number(filters.rooms)) return false;
    if (filters.area && l.area < Number(filters.area)) return false;
    return true;
  }), [opTab, filters]);

  return (
    <div>
      <Header lang={lang} setLang={setLang} t={t} />
      <Hero t={t} />
      <SearchBar t={t} filters={filters} setFilters={setFilters} opTab={opTab} setOpTab={setOpTab} />
      <section style={{ maxWidth: 1280, margin: "0 auto", padding: "48px 24px" }}>
        <h2 style={{ fontSize: 24, fontWeight: 800, color: "#1a1a2e", fontFamily: "'Playfair Display', serif", marginBottom: 24 }}>
          {t.results} <span style={{ fontSize: 16, fontWeight: 500, color: "#999" }}>({filtered.length})</span>
        </h2>
        <Results listings={filtered} t={t} />
      </section>
      <PopularCities t={t} />
      <About t={t} />
      <Footer t={t} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
