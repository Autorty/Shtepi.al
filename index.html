function LangSwitcher({lang,setLang}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[]);
  return(<div ref={ref} style={{position:"relative"}}>
    <button onClick={()=>setOpen(!open)} style={{padding:"6px 10px",border:"1px solid rgba(255,255,255,.15)",borderRadius:8,background:"rgba(255,255,255,.07)",cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>

}

function TagBadge({tag,t}){
  if(!tag)return null;
  const m={verified:{bg:"#e6f7ed",c:"#1a8c4e",icon:"verified"},newBuild:{bg:"#e8f0fe",c:"#2a5bd7",icon:"apartment"},priceReduced:{bg:"#fef3e6",c:"#d4822c",icon:"trending_down"}}[tag];

function FavBtn({size=32}){

        {[{l:t.roomsCount,v:l.rooms,i:"bed"},{l:t.totalArea,v:`${l.area} ${t.m2}`,i:"square_foot"},{l:t.floorInfo,v:`${l.floor}/${l.totalFloors}`,i:"stairs"},{l:t.buildYear,v:l.buildYear,i:"calendar_month"}].map((x,i,a)=><div key={i} style={{flex:1,textAlign:"center",padding:"14px 6px",borderRight:i<a.length-1?"1px solid #e8e7ee":"none"}}><MI name={x.i} size={18} style={{color:"#ccc",display:"block",margin:"0 auto 4px"}}/><div style={{fontSize:17,fontWeight:700,color:"#1a1a2e"}}>{x.v}</div><div style={{fontSize:11,color:"#999",marginTop:2}}>{x.l}</div></div>)}
      </div>}
      <div style={{marginBottom:22}}><h3 style={{fontSize:16,fontWeight:700,color:"#1a1a2e",marginBottom:8}}>{t.description}</h3><p style={{fontSize:14,color:"#555",lineHeight:1.75}}>{t.descText}</p></div>
      {!isLand&&<div style={{marginBottom:22}}><h3 style={{fontSize:16,fontWeight:700,color:"#1a1a2e",marginBottom:10}}>{t.characteristics}</h3>
        <div style={{borderRadius:10,border:"1px solid #e8e7ee",overflow:"hidden"}}>{[[t.totalArea,`${l.area} ${t.m2}`,"square_foot"],[t.roomsCount,l.rooms,"bed"],[t.floorInfo,`${l.floor}/${l.totalFloors}`,"stairs"],[t.buildYear,l.buildYear,"calendar_month"],[t.heating,t[l.heating],"local_fire_department"],[t.condition,t[l.condition],"home_repair_service"]].map(([label,value,icon],i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:i%2?"#fff":"#faf9fe",borderBottom:i<5?"1px solid #f0eff5":"none"}}><span style={{fontSize:13,color:"#888",display:"flex",alignItems:"center",gap:6}}><MI name={icon} size={16} style={{color:"#ccc"}}/>{label}</span><span style={{fontSize:13,fontWeight:600,color:"#1a1a2e"}}>{value}</span></div>)}</div>
      </div>}
      <div style={{background:"#faf9fe",borderRadius:12,padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14,marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:46,height:46,borderRadius:"50%",background:"linear-gradient(135deg,#e8543e,#c0392b)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700}}><MI name="person" size={22} style={{color:"#fff"}}/></div>
          <div><div style={{fontSize:15,fontWeight:700,color:"#1a1a2e"}}>{l.sellerName}</div><div style={{fontSize:12,color:"#999"}}>{l.isAgent?t.agent:t.seller}</div></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={{padding:"9px 20px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#e8543e,#c0392b)",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}><MI name="call" size={16} style={{color:"#fff"}}/> {t.call}</button>
          <button style={{padding:"9px 20px",borderRadius:8,border:"1px solid #e0dfe6",background:"#fff",color:"#1a1a2e",cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}><MI name="mail" size={16} style={{color:"#999"}}/> {t.writeMsg}</button>
        </div>
      </div>
      <div style={{display:"flex",gap:14,fontSize:11,color:"#bbb",alignItems:"center"}}><span style={{display:"flex",alignItems:"center",gap:3}}><MI name="tag" size={13} style={{color:"#ccc"}}/>{l.id}</span><span style={{display:"flex",alignItems:"center",gap:3}}><MI name="schedule" size={13} style={{color:"#ccc"}}/>{l.publishedDays}d</span><span style={{display:"flex",alignItems:"center",gap:3}}><MI name="visibility" size={13} style={{color:"#ccc"}}/>{l.viewsCount} {t.views}</span></div>
    </div>
  </div>);
  if(isMobile) return<div className="mobile-detail-wrapper" style={{position:"fixed",inset:0,zIndex:200,background:"#f6f5fb",overflowY:"auto"}}>{content}</div>;
  return<div style={{animation:"slideInRight .3s cubic-bezier(.4,0,.2,1) both"}}>{content}</div>;
}

// ── Results Section ────────────────────────────────────────
function ResultsSection({listings,t,selected,setSelected,isMobile,viewMode}){
  const ref=useRef(null);
  useEffect(()=>{if(selected&&ref.current)ref.current.scrollTop=0},[selected]);
  if(!listings.length)return<div style={{textAlign:"center",padding:"60px 24px",color:"#999",fontSize:16}}>{t.noResults}</div>;

  if(!selected){
    if(viewMode==="list") return<div>{listings.map(l=><ListCard key={l.id} listing={l} t={t} onOpen={setSelected}/>)}</div>;
    return<div className="grid-results" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:24}}>{listings.map((l,i)=><PropertyCard key={l.id} listing={l} t={t} delay={Math.min(i*.06,.5)} onOpen={setSelected}/>)}</div>;
  }

  if(isMobile) return<div>
    {viewMode==="list"?<div>{listings.map(l=><ListCard key={l.id} listing={l} t={t} onOpen={setSelected}/>)}</div>
    :<div className="grid-results" style={{display:"grid",gridTemplateColumns:"1fr",gap:24}}>{listings.map(l=><PropertyCard key={l.id} listing={l} t={t} delay={0} onOpen={setSelected}/>)}</div>}
    <DetailPanel listing={selected} t={t} onClose={()=>setSelected(null)} isMobile={true}/>
  </div>;

  return<div className="split-container" style={{display:"flex",gap:20,minHeight:600}}>
    <div className="split-list" style={{width:"30%",flexShrink:0,maxHeight:"calc(100vh - 80px)",overflowY:"auto",position:"sticky",top:80,paddingRight:4}}>{listings.map(l=><MiniCard key={l.id} listing={l} t={t} active={l.id===selected.id} onClick={()=>setSelected(l)}/>)}</div>
    <div className="split-detail" ref={ref} style={{flex:1,minWidth:0}}><DetailPanel listing={selected} t={t} onClose={()=>setSelected(null)} isMobile={false}/></div>
  </div>;
}

function PopularCities({t}){
  const counts=[1240,890,720,560,430,380];
  return<section style={{maxWidth:1280,margin:"0 auto",padding:"64px 24px"}}>
    <h2 style={{fontSize:28,fontWeight:800,color:"#1a1a2e",fontFamily:"'Playfair Display',serif",marginBottom:32}}>{t.popularCities}</h2>
    <div className="grid-cities" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16}}>{CITIES.slice(0,6).map((name,i)=><div key={name} style={{position:"relative",borderRadius:14,overflow:"hidden",paddingTop:i<2?"55%":"65%",cursor:"pointer"}}><img src={CITY_THUMBS[i]} alt={name} loading="lazy" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 30%,rgba(0,0,0,.6))"}}/><div style={{position:"absolute",bottom:16,left:18}}><div style={{color:"#fff",fontSize:20,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{name}</div><div style={{color:"rgba(255,255,255,.65)",fontSize:13,marginTop:2,display:"flex",alignItems:"center",gap:3}}><MI name="home" size={13} style={{color:"rgba(255,255,255,.5)"}}/>{counts[i]} {t.statsListings.toLowerCase()}</div></div></div>)}</div>
  </section>;
}

function About({t}){
  const items=[{icon:"verified_user",title:t.about1title,desc:t.about1desc,color:"#e6f7ed"},{icon:"map",title:t.about2title,desc:t.about2desc,color:"#e8f0fe"},{icon:"language",title:t.about3title,desc:t.about3desc,color:"#fef3e6"},{icon:"handshake",title:t.about4title,desc:t.about4desc,color:"#f3e8fe"}];
  return<section style={{background:"linear-gradient(180deg,#f6f5fb,#eeedf5)",padding:"64px 24px"}}><div style={{maxWidth:1280,margin:"0 auto"}}><h2 style={{textAlign:"center",fontSize:28,fontWeight:800,color:"#1a1a2e",fontFamily:"'Playfair Display',serif",marginBottom:40}}>{t.aboutTitle}</h2>
    <div className="grid-about" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(250px,1fr))",gap:20}}>{items.map((it,i)=><div key={i} style={{background:"#fff",borderRadius:14,padding:"28px 24px",boxShadow:"0 2px 12px rgba(0,0,0,.04)"}}><div style={{width:50,height:50,borderRadius:13,background:it.color,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:16}}><MI name={it.icon} size={24} style={{color:"#555"}}/></div><div style={{fontSize:17,fontWeight:700,color:"#1a1a2e",marginBottom:8}}>{it.title}</div><div style={{fontSize:14,color:"#777",lineHeight:1.65}}>{it.desc}</div></div>)}</div>
  </div></section>;
}

function Footer({t}){
  return<footer style={{background:"#0e0e1e",color:"rgba(255,255,255,.5)",padding:"48px 24px 32px"}}><div className="footer-inner" style={{maxWidth:1280,margin:"0 auto",display:"flex",flexWrap:"wrap",gap:48,justifyContent:"space-between"}}>
    <div style={{flex:"1 1 280px"}}><div style={{fontSize:24,fontWeight:800,color:"#fff",fontFamily:"'Playfair Display',serif",marginBottom:12}}>{t.brand}</div><p style={{fontSize:14,lineHeight:1.7,maxWidth:320}}>{t.footerDesc}</p></div>
    <div style={{flex:"1 1 140px"}}><div style={{fontWeight:700,color:"#fff",fontSize:14,marginBottom:16}}>{t.footerNav}</div><div style={{display:"flex",flexDirection:"column",gap:10,fontSize:14}}><a href="#">{t.buy}</a><a href="#">{t.rent}</a><a href="#">{t.daily}</a><a href="#">{t.addListing}</a></div></div>
    <div style={{flex:"1 1 180px"}}><div style={{fontWeight:700,color:"#fff",fontSize:14,marginBottom:16}}>{t.footerContact}</div><div style={{display:"flex",flexDirection:"column",gap:10,fontSize:14}}><span style={{display:"flex",alignItems:"center",gap:6}}><MI name="mail" size={15} style={{color:"rgba(255,255,255,.3)"}}/>info@shtepi.al</span><span style={{display:"flex",alignItems:"center",gap:6}}><MI name="call" size={15} style={{color:"rgba(255,255,255,.3)"}}/>+355 69 123 4567</span><span style={{display:"flex",alignItems:"center",gap:6}}><MI name="location_on" size={15} style={{color:"rgba(255,255,255,.3)"}}/>Tiranë, Albania</span></div></div>
  </div><div style={{maxWidth:1280,margin:"32px auto 0",paddingTop:24,borderTop:"1px solid rgba(255,255,255,.06)",fontSize:13,textAlign:"center"}}>© 2026 Shtëpi.al — {t.footerRights}</div></footer>;
}

function App(){
  const[lang,setLang]=useState("sq");
  const[opTab,setOpTab]=useState("buy");
  const[filters,setFilters]=useState({city:"",type:"",priceFrom:"",priceTo:"",rooms:"",area:""});
  const[selected,setSelected]=useState(null);
  const[sort,setSort]=useState("newest");
  const[viewMode,setViewMode]=useState("grid");
  const isMobile=useIsMobile();
  const t=T[lang];

  const filtered=useMemo(()=>{
    let res=ALL.filter(l=>{
      if(l.opType!==opTab)return false;
      if(filters.city&&l.city!==filters.city)return false;
      if(filters.type&&l.type!==filters.type)return false;
      if(filters.priceFrom&&l.price<Number(filters.priceFrom))return false;
      if(filters.priceTo&&l.price>Number(filters.priceTo))return false;
      if(filters.rooms&&l.rooms<Number(filters.rooms))return false;
      if(filters.area&&l.area<Number(filters.area))return false;
      return true;
    });
    if(sort==="priceLow")res=[...res].sort((a,b)=>a.price-b.price);
    else if(sort==="priceHigh")res=[...res].sort((a,b)=>b.price-a.price);
    else if(sort==="area")res=[...res].sort((a,b)=>b.area-a.area);
    return res;
  },[opTab,filters,sort]);

  useEffect(()=>{setSelected(null)},[opTab,filters]);

  return<div>
    <Header lang={lang} setLang={setLang} t={t}/>
    <Hero t={t}/>
    <SearchBar t={t} filters={filters} setFilters={setFilters} opTab={opTab} setOpTab={setOpTab}/>
    <section style={{maxWidth:1280,margin:"0 auto",padding:"48px 24px"}}>
      <h2 style={{fontSize:24,fontWeight:800,color:"#1a1a2e",fontFamily:"'Playfair Display',serif",marginBottom:20}}>{t.results} <span style={{fontSize:16,fontWeight:500,color:"#999"}}>({filtered.length})</span></h2>
      <Toolbar t={t} sort={sort} setSort={setSort} viewMode={viewMode} setViewMode={setViewMode}/>
      <ResultsSection listings={filtered} t={t} selected={selected} setSelected={setSelected} isMobile={isMobile} viewMode={viewMode}/>
    </section>
    {!selected&&<><PopularCities t={t}/><About t={t}/></>}
    <Footer t={t}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
