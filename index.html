function gen(){

function TagBadge({tag,t}){
  if(!tag)return null;
  const m={verified:{bg:"#e6f7ed",c:"#1a8c4e",i:"✓"},newBuild:{bg:"#e8f0fe",c:"#2a5bd7",i:"★"},priceReduced:{bg:"#fef3e6",c:"#d4822c",i:"↓"}}[tag];
  if(!m)return null;
  return<span style={{position:"absolute",top:8,left:8,padding:"4px 8px",borderRadius:6,fontSize:10,fontWeight:700,background:m.bg,color:m.c,display:"flex",alignItems:"center",gap:3,zIndex:2}}>{m.i} {t[tag]}</span>;
}

function FavBtn({size=32}){
  const[f,setF]=useState(false);
  return<button onClick={e=>{e.stopPropagation();setF(!f)}} style={{width:size,height:size,borderRadius:"50%",border:"none",background:"rgba(255,255,255,.85)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size>32?18:14,backdropFilter:"blur(8px)",transition:"transform .2s",transform:f?"scale(1.15)":"scale(1)"}}>{f?"❤️":"🤍"}</button>;
}

// ── Results section: grid OR split view ────────────────────
function ResultsSection({listings,t,selected,setSelected,isMobile}){
  const detailRef=useRef(null);

  useEffect(()=>{
    if(selected&&detailRef.current){detailRef.current.scrollTop=0;}
  },[selected]);

  if(!listings.length) return<div style={{textAlign:"center",padding:"60px 24px",color:"#999",fontSize:16}}>{t.noResults}</div>;

  // No selection → normal grid
  if(!selected){
    return(<div className="grid-results" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:24}}>
      {listings.map((l,i)=><PropertyCard key={l.id} listing={l} t={t} delay={Math.min(i*.06,.5)} onOpen={setSelected}/>)}
    </div>);
  }

  // Mobile: show detail overlay
  if(isMobile){
    return(<div>
      <div className="grid-results" style={{display:"grid",gridTemplateColumns:"1fr",gap:24}}>
        {listings.map((l,i)=><PropertyCard key={l.id} listing={l} t={t} delay={0} onOpen={setSelected}/>)}
      </div>
      <DetailPanel listing={selected} t={t} onClose={()=>setSelected(null)} isMobile={true}/>
    </div>);
  }

  // Desktop: split 30/70
  return(<div className="split-container" style={{display:"flex",gap:20,minHeight:600}}>
    {/* Left: scrollable list 30% */}
    <div className="split-list" style={{width:"30%",flexShrink:0,maxHeight:"calc(100vh - 80px)",overflowY:"auto",position:"sticky",top:80,paddingRight:4}}>
      {listings.map(l=><MiniCard key={l.id} listing={l} t={t} active={l.id===selected.id} onClick={()=>setSelected(l)}/>)}
    </div>
    {/* Right: detail 70% */}
    <div className="split-detail" ref={detailRef} style={{flex:1,minWidth:0}}>
      <DetailPanel listing={selected} t={t} onClose={()=>setSelected(null)} isMobile={false}/>
    </div>
  </div>);
}

// ── App ────────────────────────────────────────────────────
function App(){
  const[lang,setLang]=useState("uk");
  const[opTab,setOpTab]=useState("buy");
  const[filters,setFilters]=useState({city:"",type:"",priceFrom:"",priceTo:"",rooms:"",area:""});
  const[selected,setSelected]=useState(null);
  const isMobile=useIsMobile();
  const t=T[lang];

  const filtered=useMemo(()=>ALL.filter(l=>{
    if(l.opType!==opTab)return false;
    if(filters.city&&l.city!==filters.city)return false;
    if(filters.type&&l.type!==filters.type)return false;
    if(filters.priceFrom&&l.price<Number(filters.priceFrom))return false;
    if(filters.priceTo&&l.price>Number(filters.priceTo))return false;
    if(filters.rooms&&l.rooms<Number(filters.rooms))return false;
    if(filters.area&&l.area<Number(filters.area))return false;
    return true;
  }),[opTab,filters]);

  // Reset selection when filters change
  useEffect(()=>{setSelected(null)},[opTab,filters]);

  return(<div>
    <Header lang={lang} setLang={setLang} t={t}/>
    <Hero t={t}/>
    <SearchBar t={t} filters={filters} setFilters={setFilters} opTab={opTab} setOpTab={setOpTab}/>
    <section style={{maxWidth:1280,margin:"0 auto",padding:"48px 24px"}}>
      <h2 style={{fontSize:24,fontWeight:800,color:"#1a1a2e",fontFamily:"'Playfair Display',serif",marginBottom:24}}>{t.results} <span style={{fontSize:16,fontWeight:500,color:"#999"}}>({filtered.length})</span></h2>
      <ResultsSection listings={filtered} t={t} selected={selected} setSelected={setSelected} isMobile={isMobile}/>
    </section>
    {!selected&&<><PopularCities t={t}/><About t={t}/></>}
    <Footer t={t}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
